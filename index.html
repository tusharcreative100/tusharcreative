<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM PRO - Administrative Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f2f5;
            --primary-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --accent: #4e73df;
            --sidebar-width: 260px;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
            --purple: #6f42c1;
            --success: #1cc88a;
            --warning: #f6c23e;
            --danger: #e74a3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg-body); color: #444; overflow-x: hidden; }

        .brand-logo { width: 80px; height: 80px; object-fit: contain; margin: 10px auto; display: block; }

        #loginSection { height: 100vh; background: var(--primary-gradient); display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }

        .main-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: #1a1c23; color: white; position: fixed; height: 100vh; padding: 20px 0; z-index: 100; transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 0 25px 30px; text-align: center; border-bottom: 1px solid #333; margin-bottom: 20px; }
        
        .nav-item { padding: 12px 25px; display: flex; align-items: center; cursor: pointer; color: #b0b0b0; font-size: 14px; text-decoration: none; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; border-left: 4px solid var(--accent); }
        .nav-item i { margin-right: 12px; width: 20px; text-align: center; }

        .sidebar-calendar { margin-top: auto; padding: 20px; background: rgba(255,255,255,0.05); border-top: 1px solid #333; }
        .clock-live { font-size: 22px; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 5px; }
        .date-live { font-size: 12px; color: #888; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        
        .content-area { flex-grow: 1; margin-left: var(--sidebar-width); padding: 30px; width: calc(100% - var(--sidebar-width)); }
        
        .top-bar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 20px; border-radius: 12px; box-shadow: var(--card-shadow); margin-bottom: 30px; border: 1px solid white; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; margin-bottom: 15px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        .filter-input { padding: 8px; border-radius: 8px; border: 1px solid #ddd; outline: none; font-size: 13px; }

        .quick-links { display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .link-btn { text-decoration: none; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 6px; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .link-sheet { background: #e6f4ea; color: #1e7e34; }
        .link-drive { background: #fef7e0; color: #b06000; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: var(--card-shadow); border-left: 5px solid #ddd; }
        .stat-card .val { font-size: 24px; font-weight: bold; margin-top: 5px; color: #333; }

        .data-panel { background: white; border-radius: 15px; box-shadow: var(--card-shadow); overflow-x: auto; margin-bottom: 25px; border: 1px solid #eee; }
        .panel-header { padding: 15px; background: #f8f9fc; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8f9fc; padding: 12px; text-align: left; font-size: 11px; color: #888; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #f1f1f1; font-size: 13px; color: #555; }
        
        .status-pill { padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-delivery { background: #cce5ff; color: #004085; }

        .excel-btn { background: #217346; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .submit-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar-brand h3, .nav-item span, .sidebar-calendar { display: none; }
            .content-area { margin-left: 80px; width: calc(100% - 80px); }
        }
    </style>
</head>
<body>

<div id="loginSection">
    <div class="login-card">
        <img src="https://i.ibb.co/R4bjpLpM/logo.png" alt="Logo" class="brand-logo">
        <h2 style="color: #1e3c72; margin-bottom: 20px;">OFFICE ADMIN LOGIN</h2>
        <div class="input-group" style="text-align: left; margin-bottom:15px;"><label style="font-size:12px;font-weight:bold;">Email</label><input type="email" id="loginId" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;"></div>
        <div class="input-group" style="text-align: left; margin-bottom:15px;"><label style="font-size:12px;font-weight:bold;">Password</label><input type="password" id="loginPass" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;"></div>
        <button class="submit-btn" onclick="handleLogin()">Sign In</button>
    </div>
</div>

<div id="appWrapper" class="main-wrapper" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-brand">
            <img src="https://i.ibb.co/R4bjpLpM/logo.png" alt="Logo" class="brand-logo">
            <h3 style="letter-spacing: 1px; color: white; font-size:18px;">CRM PRO</h3>
        </div>
        
        <div class="nav-item active" onclick="switchTab(event, 'ADMIN')"><i class="fas fa-chart-line"></i> <span>Dashboard</span></div>
        <div class="nav-item" onclick="switchTab(event, 'RECORD')"><i class="fas fa-file-alt"></i> <span>Record Entry</span></div>
        <div class="nav-item" onclick="switchTab(event, 'REGISTRY')"><i class="fas fa-id-badge"></i> <span>Registry Entry</span></div>
        <div class="nav-item" onclick="switchTab(event, 'DUE')"><i class="fas fa-wallet"></i> <span>Due Entry</span></div>
        <div class="nav-item" onclick="switchTab(event, 'COLLECTION')"><i class="fas fa-coins"></i> <span>Collection</span></div>
        <div class="nav-item" onclick="handleLogout()" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></div>

        <div class="sidebar-calendar">
            <div id="liveClock" class="clock-live">00:00:00</div>
            <div id="liveDate" class="date-live">Loading...</div>
        </div>
    </div>

    <div class="content-area">
        <div class="top-bar">
            <div class="filter-row">
                <div class="filter-group"><label>Start Date</label><input type="date" id="startDate" class="filter-input" onchange="refreshAdmin()"></div>
                <div class="filter-group"><label>End Date</label><input type="date" id="endDate" class="filter-input" onchange="refreshAdmin()"></div>
                <div class="filter-group">
                    <label>Status Filter</label>
                    <select id="statusFilter" class="filter-input" onchange="refreshAdmin()">
                        <option value="ALL">All Status</option>
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                        <option value="Delivery">Delivery</option>
                        <option value="DUE_ONLY">Has Due</option>
                    </select>
                </div>
                <div class="filter-group"><label>Search</label><input type="text" id="masterSearch" placeholder="Name or Phone..." class="filter-input" onkeyup="refreshAdmin()" style="width: 200px;"></div>
                <button onclick="resetFilters()" style="padding: 8px 15px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fc; cursor: pointer; font-size: 12px;">Reset</button>
            </div>
            
            <div class="quick-links">
                <a href="https://docs.google.com/spreadsheets" target="_blank" class="link-btn link-sheet"><i class="fas fa-file-excel"></i> Sheets</a>
                <a href="https://drive.google.com" target="_blank" class="link-btn link-drive"><i class="fab fa-google-drive"></i> Drive</a>
                <span id="profileEmail" style="margin-left: auto; font-size: 12px; color: var(--accent); font-weight: bold;"></span>
            </div>
        </div>

        <div id="section-ADMIN" class="tab-content">
            <div class="stat-grid">
                <div class="stat-card" style="border-left-color: var(--accent);"><h4>Record</h4><div class="val" id="statRecord">0</div></div>
                <div class="stat-card" style="border-left-color: var(--purple);"><h4>Registry</h4><div class="val" id="statRegistry">0</div></div>
                <div class="stat-card" style="border-left-color: var(--warning);"><h4>Due</h4><div class="val" id="statDue">0</div></div>
                <div class="stat-card" style="border-left-color: var(--success);"><h4>Collection</h4><div class="val" id="statColl">0</div></div>
            </div>
            <div id="panelsContainer"></div>
        </div>

        <div id="section-FORM" class="tab-content" style="display: none;">
            <div style="max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: var(--card-shadow);">
                <h3 id="formTitle">Entry Form</h3><br>
                <form id="universalForm">
                    <input type="hidden" id="entryType">
                    <div style="margin-bottom:15px;"><label style="display:block;font-size:13px;font-weight:bold;margin-bottom:5px;">Date</label><input type="date" id="todayDate" name="date" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;" required></div>
                    <div style="margin-bottom:15px;"><label style="display:block;font-size:13px;font-weight:bold;margin-bottom:5px;">Customer Name</label><input type="text" name="name" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;" required></div>
                    
                    <div id="normalFields">
                        <div style="margin-bottom:15px;"><label style="display:block;font-size:13px;font-weight:bold;margin-bottom:5px;">Phone</label><input type="tel" name="mobile" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;"></div>
                        <div style="margin-bottom:15px;"><label style="display:block;font-size:13px;font-weight:bold;margin-bottom:5px;">Address</label><textarea name="address" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;"></textarea></div>
                        <div style="margin-bottom:15px;"><label style="display:block;font-size:13px;font-weight:bold;margin-bottom:5px;">Status</label>
                            <select name="status" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;">
                                <option value="Pending">Pending</option><option value="Completed">Completed</option><option value="Delivery">Delivery</option>
                            </select>
                        </div>
                        <div style="margin-bottom:15px;"><label style="display:block;font-size:13px;font-weight:bold;margin-bottom:5px;">Due Amount</label><input type="number" name="due" value="0" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;"></div>
                        <div style="margin-bottom:15px;"><label style="display:block;font-size:13px;font-weight:bold;margin-bottom:5px;">Payment</label><input type="number" name="payment" value="0" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;"></div>
                    </div>
                    <div id="collectionFields" style="display:none;">
                        <div style="margin-bottom:15px;"><label style="display:block;font-size:13px;font-weight:bold;margin-bottom:5px;">Collection Amount</label><input type="number" name="coll_amount" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;"></div>
                        <div style="margin-bottom:15px;"><label style="display:block;font-size:13px;font-weight:bold;margin-bottom:5px;">Note</label><textarea name="purpose" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;"></textarea></div>
                    </div>
                    <button type="submit" id="saveBtn" class="submit-btn">Save Data</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="updateModal" class="modal">
    <div class="modal-content">
        <h3>Update Data</h3><br>
        <input type="hidden" id="updateId">
        <div style="margin-bottom:15px;"><label style="display:block;font-size:12px;font-weight:bold;">Status</label>
            <select id="updStatus" style="width:100%;padding:8px;border-radius:8px;border:1px solid #ddd;">
                <option value="Pending">Pending</option><option value="Completed">Completed</option><option value="Delivery">Delivery</option>
            </select>
        </div>
        <div style="margin-bottom:15px;"><label style="display:block;font-size:12px;font-weight:bold;">Due</label><input type="number" id="updDue" style="width:100%;padding:8px;border-radius:8px;border:1px solid #ddd;"></div>
        <div style="margin-bottom:15px;"><label style="display:block;font-size:12px;font-weight:bold;">Payment</label><input type="number" id="updPay" style="width:100%;padding:8px;border-radius:8px;border:1px solid #ddd;"></div>
        <button class="submit-btn" style="background:var(--success)" onclick="saveUpdate()">Update Now</button>
        <button class="submit-btn" style="background:var(--danger); margin-top:10px" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    const firebaseConfig = {
  apiKey: "AIzaSyDsJreVML0Il1nfkZg1B-1536ESYa9avoI",
  authDomain: "tusharcreative-feec5.firebaseapp.com",
  projectId: "tusharcreative-feec5",
  storageBucket: "tusharcreative-feec5.firebasestorage.app",
  messagingSenderId: "1066102136169",
  appId: "1:1066102136169:web:e125d78ff735da95d071f8",
  measurementId: "G-PPYG2G95GW"
};
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const fdb = firebase.firestore();

    function setCurrentDate() {
        const today = new Date().toISOString().split('T')[0];
        const el = document.getElementById('todayDate');
        if(el) el.value = today;
    }

    function updateLiveClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('liveClock').innerText = `${hours}:${minutes}:${seconds}`;
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('liveDate').innerText = now.toLocaleDateString(undefined, options);
    }
    setInterval(updateLiveClock, 1000);
    updateLiveClock();

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appWrapper').style.display = 'flex';
            document.getElementById('profileEmail').innerText = user.email;
            setCurrentDate();
            listenToFirebase();
        }
    });

    async function handleLogin() {
        const email = document.getElementById('loginId').value;
        const pass = document.getElementById('loginPass').value;
        try { await auth.signInWithEmailAndPassword(email, pass); } catch (e) { alert(e.message); }
    }
    function handleLogout() { auth.signOut().then(() => location.reload()); }

    function switchTab(e, type) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        if(type === 'ADMIN') {
            document.getElementById('section-ADMIN').style.display = 'block';
        } else {
            document.getElementById('section-FORM').style.display = 'block';
            document.getElementById('formTitle').innerText = type + " ENTRY";
            document.getElementById('entryType').value = type;
            document.getElementById('collectionFields').style.display = (type === 'COLLECTION') ? 'block' : 'none';
            document.getElementById('normalFields').style.display = (type === 'COLLECTION') ? 'none' : 'block';
            setCurrentDate();
        }
        if(e) e.currentTarget.classList.add('active');
    }

    document.getElementById('universalForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        const type = document.getElementById('entryType').value;
        const data = Object.fromEntries(new FormData(e.target).entries());
        data.type = type; btn.disabled = true;
        try {
            await fdb.collection('crm_data').add(data);
            alert("Data Saved!"); 
            e.target.reset();
            setCurrentDate();
        } catch (err) { alert(err.message); }
        finally { btn.disabled = false; }
    };

    let allData = [];
    let currentFilteredData = [];
    function listenToFirebase() {
        fdb.collection('crm_data').onSnapshot(snap => {
            allData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            refreshAdmin();
        });
    }

    function resetFilters() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('statusFilter').value = 'ALL';
        document.getElementById('masterSearch').value = '';
        refreshAdmin();
    }

    function refreshAdmin() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const statF = document.getElementById('statusFilter').value;
        const search = document.getElementById('masterSearch').value.toLowerCase();
        const container = document.getElementById('panelsContainer');
        container.innerHTML = '';

        currentFilteredData = allData.filter(item => {
            const itemDate = item.date;
            const itemStatus = item.status || '';
            const itemDue = parseFloat(item.due || 0);
            let dateMatch = (start && end) ? (itemDate >= start && itemDate <= end) : true;
            let statusMatch = (statF === 'DUE_ONLY') ? (itemDue > 0) : (statF !== 'ALL' ? (itemStatus === statF) : true);
            const searchMatch = (item.name || '').toLowerCase().includes(search) || (item.mobile || '').toLowerCase().includes(search);
            return dateMatch && statusMatch && searchMatch;
        });

        ['RECORD', 'REGISTRY', 'DUE', 'COLLECTION'].forEach(type => {
            const list = currentFilteredData.filter(i => i.type === type);
            const countEl = document.getElementById('stat' + (type==='COLLECTION'?'Coll':type.charAt(0)+type.slice(1).toLowerCase()));
            if(countEl) countEl.innerText = list.length;

            if(list.length > 0) {
                const panel = document.createElement('div');
                panel.className = 'data-panel';
                let tableHeader = (type === 'COLLECTION') ? 
                    `<tr><th>Date</th><th>Name</th><th>Amount</th><th>Note</th><th>Action</th></tr>` :
                    `<tr><th>Date</th><th>Name</th><th>Address</th><th>Phone</th><th>Due</th><th>Payment</th><th>Status</th><th>Action</th></tr>`;

                let tableRows = list.map(item => {
                    if(type === 'COLLECTION') {
                        return `<tr><td>${item.date}</td><td><b>${item.name}</b></td><td>₹${item.coll_amount}</td><td>${item.purpose || '-'}</td><td><button onclick="deleteEntry('${item.id}')" style="color:red;border:none;background:none;cursor:pointer;"><i class="fas fa-trash"></i></button></td></tr>`;
                    } else {
                        return `<tr><td>${item.date}</td><td><b>${item.name}</b></td><td>${item.address || '-'}</td><td>${item.mobile || '-'}</td><td>₹${item.due || 0}</td><td>₹${item.payment || 0}</td><td><span class="status-pill status-${(item.status || 'pending').toLowerCase()}">${item.status || 'Pending'}</span></td><td><button onclick="openEdit('${item.id}','${item.status}','${item.due}','${item.payment}')" style="color:blue;border:none;background:none;cursor:pointer;"><i class="fas fa-edit"></i></button><button onclick="deleteEntry('${item.id}')" style="color:red;border:none;background:none;cursor:pointer;margin-left:10px;"><i class="fas fa-trash"></i></button></td></tr>`;
                    }
                }).join('');

                panel.innerHTML = `<div class="panel-header"><span>${type} DATA</span><button onclick="downloadExcel('${type}')" class="excel-btn"><i class="fas fa-file-excel"></i> Excel</button></div><table><thead>${tableHeader}</thead><tbody>${tableRows}</tbody></table>`;
                container.appendChild(panel);
            }
        });
    }

    // UPDATED EXCEL DOWNLOAD FUNCTION WITH SPECIFIC PATTERN
    function downloadExcel(type) {
        // Filter and Format data for the specified pattern
        const formattedList = currentFilteredData
            .filter(i => i.type === type)
            .map(item => {
                if (type === 'COLLECTION') {
                    return {
                        'Date': item.date || '',
                        'Name': item.name || '',
                        'Address': item.address || '-',
                        'Phone': item.mobile || '-',
                        'Collection Amount': item.coll_amount || 0,
                        'Note': item.purpose || '-'
                    };
                } else {
                    // This matches your requested pattern: Date, Name, Address, Phone, Due, Payment, Status
                    return {
                        'Date': item.date || '',
                        'Name': item.name || '',
                        'Address': item.address || '-',
                        'Phone': item.mobile || '-',
                        'Due': item.due || 0,
                        'Payment': item.payment || 0,
                        'Status': item.status || 'Pending'
                    };
                }
            });

        if (formattedList.length === 0) {
            alert("No data available to export.");
            return;
        }

        const ws = XLSX.utils.json_to_sheet(formattedList);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, type);
        
        // Final Download
        XLSX.writeFile(wb, `${type}_Report_${new Date().toLocaleDateString()}.xlsx`);
    }

    function openEdit(id, s, d, p) {
        document.getElementById('updateId').value = id;
        document.getElementById('updStatus').value = s;
        document.getElementById('updDue').value = d;
        document.getElementById('updPay').value = p;
        document.getElementById('updateModal').style.display = 'block';
    }
    function closeModal() { document.getElementById('updateModal').style.display = 'none'; }
    async function saveUpdate() {
        await fdb.collection('crm_data').doc(document.getElementById('updateId').value).update({
            status: document.getElementById('updStatus').value, 
            due: document.getElementById('updDue').value, 
            payment: document.getElementById('updPay').value
        });
        alert("Updated!"); closeModal();
    }
    function deleteEntry(id) { if(confirm("Delete permanently?")) fdb.collection('crm_data').doc(id).delete(); }
</script>
